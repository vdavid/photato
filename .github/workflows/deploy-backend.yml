name: Deploy backend

# Runs on pushes to main that touch the Go backend or its deploy infra. CI stays
# lean (gofmt + go vet + go test, no -race, no docker build — GitHub minutes are
# limited); the Hetzner box builds the image itself when it gets the signed
# webhook. If any check fails the webhook is never sent, so a broken commit can't
# deploy.

on:
  push:
    branches: [main]
    paths:
      - 'backend-go/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on the runner).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-deploy:
    name: Test and trigger deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-go
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Check formatting
        run: |
          unformatted="$(mise exec -- gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: mise exec -- go vet ./...

      - name: Test
        run: mise exec -- go test ./...

      - name: Trigger deploy webhook
        if: github.event_name == 'push'
        run: |
          # Sign an empty payload with the shared secret, matching the box's
          # webhook listener (HMAC-SHA256, X-Hub-Signature-256 header).
          PAYLOAD='{}'
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)
          curl -fsS -X POST https://api.photato.eu/hooks/deploy-photato \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
