name: Deploy

# Runs on pushes to main that touch the backend, the frontend, the check runner, or their deploy
# infra. The whole gate is the project's own check runner in CI mode: `./scripts/check.sh --ci` runs
# the default lane (Go gofmt/vet/staticcheck/tests + frontend eslint/format/svelte-check/vite build +
# e2e eslint/format/typecheck), no `-race`, no Docker, no browsers. The slow Playwright pixel suite is
# excluded by design (it's Docker-only and runs locally). GitHub minutes are limited, so the Hetzner box
# builds both the backend image and the frontend bundle itself when it gets the signed webhook. If any
# check fails the webhook is never sent, so a broken commit can't deploy.

on:
  push:
    branches: [main]
    paths:
      - 'backend-go/**'
      - 'frontend/**'
      - 'infra/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
      - '.mise.toml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      # Docs-only pushes don't deploy (negated pattern — GitHub forbids mixing
      # `paths` with `paths-ignore`). A push mixing .md and code still deploys.
      - '!**/*.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on the runner).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Trust both .mise.toml files (root + backend-go) without an interactive prompt;
  # a fresh checkout's configs are untrusted until listed here.
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

jobs:
  test-and-deploy:
    name: Test and trigger deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Go (check runner + backend) and Node (frontend/e2e) come from mise, pinned
      # in the root .mise.toml. pnpm comes from corepack on the mise-provided Node.
      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      # The whole gate: the check runner in CI mode. It installs the pnpm workspace
      # deps (--frozen-lockfile) itself, runs the default lane in parallel, and
      # auto-fixers become hard failures (`--ci`). No slow checks, no Docker.
      - name: Run checks
        run: ./scripts/check.sh --ci

      # --- Trigger deploy ---
      - name: Trigger deploy webhook
        if: github.event_name == 'push'
        run: |
          # Sign an empty payload with the shared secret, matching the box's webhook listener
          # (HMAC-SHA256, X-Hub-Signature-256 header). The box builds both images and rolls them.
          PAYLOAD='{}'
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)
          curl -fsS -X POST https://api.photato.eu/hooks/deploy-photato \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
