name: Deploy

# Runs on pushes to main that touch the backend, the frontend, or their deploy infra. CI stays lean
# (Go: gofmt + vet + test, no -race, no docker build; frontend: `svelte-check` + `vite build`, no
# browser installs — Playwright pixel baselines run in Docker locally, not here). GitHub minutes are limited, so
# the Hetzner box builds both the backend image and the frontend bundle itself when it gets the signed
# webhook. If any check fails the webhook is never sent, so a broken commit can't deploy.

on:
  push:
    branches: [main]
    paths:
      - 'backend-go/**'
      - 'frontend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on the runner).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-deploy:
    name: Test and trigger deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-go
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # --- Backend (Go) checks ---
      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install tools with mise
        run: mise install

      - name: Check formatting
        run: |
          unformatted="$(mise exec -- gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: mise exec -- go vet ./...

      - name: Test
        run: mise exec -- go test ./...

      # --- Frontend build gate ---
      # A broken frontend build must block the deploy, same as a failing Go test. This is just the
      # bundler (no browsers), so it stays cheap. The box rebuilds from source on the webhook; this only
      # proves the build is green before we fire it.
      - name: Enable pnpm
        working-directory: .
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install frontend deps
        working-directory: .
        run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false

      # TypeScript is strict; `svelte-check` is the type gate (Vite strips types without checking, so
      # a type error would otherwise ship). It type-checks `.svelte` + `.ts`. Cheap, no browsers.
      - name: Type-check frontend
        working-directory: .
        run: pnpm --filter ./frontend check

      - name: Build frontend
        working-directory: .
        run: pnpm --filter ./frontend build

      # --- Trigger deploy ---
      - name: Trigger deploy webhook
        if: github.event_name == 'push'
        run: |
          # Sign an empty payload with the shared secret, matching the box's webhook listener
          # (HMAC-SHA256, X-Hub-Signature-256 header). The box builds both images and rolls them.
          PAYLOAD='{}'
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DEPLOY_WEBHOOK_SECRET }}" | cut -d' ' -f2)
          curl -fsS -X POST https://api.photato.eu/hooks/deploy-photato \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
